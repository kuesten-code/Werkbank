# Beispiel-Konfiguration für nginx als Reverse Proxy vor dem Werkbank-Stack.
# WebSocket-Support ist zwingend erforderlich – Blazor Server nutzt SignalR über WS.
#
# Anpassen:
#   - server_name → eigene Domain
#   - SSL-Zertifikatspfade (z. B. via Certbot/Let's Encrypt)
#   - proxy_pass-Port falls HOST_PORT in .env geändert wurde (Standard: 8080)

server {
    listen 80;
    server_name werkbank.example.com;

    # Alle HTTP-Anfragen auf HTTPS umleiten
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name werkbank.example.com;

    ssl_certificate     /etc/letsencrypt/live/werkbank.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/werkbank.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Maximale Upload-Größe (für Belegscan-Uploads in Recepta)
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8080;

        # --- WebSocket-Support (Pflicht für Blazor Server / SignalR) ---
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard-Proxy-Header
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Blazor-Verbindungen bleiben lange offen – Timeouts hochsetzen
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }
}
