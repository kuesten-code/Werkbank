services:
  postgres:
    image: postgres:16
    container_name: kuestencode_werkbank_postgres
    environment:
      POSTGRES_DB: kuestencode_werkbank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kuestencode_werkbank_network

  host:
    image: kuestencode/host:latest
    container_name: kuestencode_werkbank_host
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=kuestencode_werkbank;Username=postgres;Password=${POSTGRES_PASSWORD}
      - ServiceUrls__Faktura=http://faktura:8081
      - ServiceUrls__Rapport=http://rapport:8082
      - ServiceUrls__Offerte=http://offerte:8083
      - ServiceUrls__Acta=http://acta:8084
      - ServiceUrls__Recepta=http://recepta:8085
      - ServiceUrls__Saldo=http://saldo:8086
      - Jwt__Secret=${JWT_SECRET}
      - APPLY_MIGRATIONS=true
    volumes:
      - ./data/host:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kuestencode_werkbank_network

  faktura:
    image: kuestencode/faktura:latest
    container_name: kuestencode_werkbank_faktura
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8081
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=kuestencode_werkbank;Username=postgres;Password=${POSTGRES_PASSWORD}
      - ServiceUrls__Host=http://host:8080
      - ServiceUrls__Self=http://faktura:8081
      - APPLY_MIGRATIONS=true
    volumes:
      - ./data/faktura:/app/wwwroot/invoices
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kuestencode_werkbank_network

  rapport:
    image: kuestencode/rapport:latest
    container_name: kuestencode_werkbank_rapport
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8082
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=kuestencode_werkbank;Username=postgres;Password=${POSTGRES_PASSWORD}
      - ServiceUrls__Host=http://host:8080
      - ServiceUrls__Self=http://rapport:8082
      - APPLY_MIGRATIONS=true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      host:
        condition: service_started
    networks:
      - kuestencode_werkbank_network

  offerte:
    image: kuestencode/offerte:latest
    container_name: kuestencode_werkbank_offerte
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8083
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=kuestencode_werkbank;Username=postgres;Password=${POSTGRES_PASSWORD}
      - ServiceUrls__Host=http://host:8080
      - ServiceUrls__Self=http://offerte:8083
      - APPLY_MIGRATIONS=true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      host:
        condition: service_started
    networks:
      - kuestencode_werkbank_network

  acta:
    image: kuestencode/acta:latest
    container_name: kuestencode_werkbank_acta
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8084
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=kuestencode_werkbank;Username=postgres;Password=${POSTGRES_PASSWORD}
      - ServiceUrls__Host=http://host:8080
      - ServiceUrls__Self=http://acta:8084
      - APPLY_MIGRATIONS=true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      host:
        condition: service_started
    networks:
      - kuestencode_werkbank_network

  recepta:
    image: kuestencode/recepta:latest
    container_name: kuestencode_werkbank_recepta
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8085
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=kuestencode_werkbank;Username=postgres;Password=${POSTGRES_PASSWORD}
      - ServiceUrls__Host=http://host:8080
      - ServiceUrls__Self=http://recepta:8085
      - APPLY_MIGRATIONS=true
    volumes:
      - ./data/recepta:/app/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      host:
        condition: service_started
    networks:
      - kuestencode_werkbank_network

  saldo:
    image: kuestencode/saldo:latest
    container_name: kuestencode_werkbank_saldo
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8086
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=kuestencode_werkbank;Username=postgres;Password=${POSTGRES_PASSWORD}
      - ServiceUrls__Host=http://host:8080
      - ServiceUrls__Self=http://saldo:8086
      - ServiceUrls__Faktura=http://faktura:8081
      - ServiceUrls__Recepta=http://recepta:8085
      - APPLY_MIGRATIONS=true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      faktura:
        condition: service_started
      recepta:
        condition: service_started
    networks:
      - kuestencode_werkbank_network

  watchtower:
    image: containrrr/watchtower
    container_name: kuestencode_werkbank_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.43
      - REPO_USER=${DOCKER_USER}
      - REPO_PASS=${DOCKER_PAT}
      - WATCHTOWER_POLL_INTERVAL=300        # alle 5 Minuten prüfen
      - WATCHTOWER_CLEANUP=true             # alte Images entfernen
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_LABEL_ENABLE=true        # nur Container mit Label updaten
    command: --interval 300

networks:
  kuestencode_werkbank_network:
    driver: bridge